name: Build thesis PDF

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  source-attachments:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
          submodules: recursive

      - name: Pull Git LFS objects
        run: |
          git lfs install --local
          git lfs pull

      - name: Prepare attachments directory
        run: mkdir -p attachments

      - name: Generate p2p-stream attachment archive
        continue-on-error: true
        run: |
          rm -f attachments/p2p-stream.zip
          zip -r attachments/p2p-stream.zip p2p-stream

      - name: Generate analysis attachment archive
        continue-on-error: true
        run: |
          rm -f attachments/analysis.zip
          zip -r attachments/analysis.zip analysis

      - name: Upload source attachments
        uses: actions/upload-artifact@v7
        with:
          name: source-attachments
          path: |
            attachments/p2p-stream.zip
            attachments/analysis.zip
          if-no-files-found: ignore

  build-pdf:
    runs-on: ubuntu-latest
    needs: [source-attachments]
    strategy:
      fail-fast: false
      matrix:
        layout: [twoside, oneside]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Prepare attachments directory
        run: mkdir -p attachments

      - name: Download source attachments
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: source-attachments
          path: attachments

      - name: Bundle all attachments
        continue-on-error: true
        run: |
          set -euo pipefail
          rm -f attachments.zip

          files=(
            attachments/p2p-stream.zip
            attachments/analysis.zip
          )

          existing_files=()
          for file in "${files[@]}"; do
            if [ -f "${file}" ]; then
              existing_files+=("${file}")
            fi
          done

          if [ ${#existing_files[@]} -gt 0 ]; then
            zip -j attachments.zip "${existing_files[@]}"
          else
            echo "No attachment files were available to bundle."
          fi

      - name: Generate appendix metadata
        run: |
          bash scripts/generate_appendix_submodule_info.sh

      - name: Configure thesis layout (${{ matrix.layout }})
        run: |
          set -euo pipefail
          if [ "${{ matrix.layout }}" = "oneside" ]; then
            sed -i 's/\\documentclass\[english,twoside\]{fim-uhk-thesis}/\\documentclass[english]{fim-uhk-thesis}/' main.tex
          else
            sed -i 's/\\documentclass\[english\]{fim-uhk-thesis}/\\documentclass[english,twoside]{fim-uhk-thesis}/' main.tex
          fi

      - name: Build thesis PDF
        run: |
          nix develop -c bash -lc '
            set -euo pipefail
            rm -f main.pdf main.aux main.bbl main.blg main.bcf main.run.xml main.fdb_latexmk main.fls main.lof main.log main.lot main.out main.toc main.synctex.gz
            mkdir -p out/recorder-pipeline out/renderer-pipeline
            plantuml -tpng recorder-pipeline.puml -o out/recorder-pipeline/
            plantuml -tpng renderer-pipeline.puml -o out/renderer-pipeline/
            latexmk -pdf -shell-escape -synctex=1 -interaction=nonstopmode -file-line-error main.tex
            ! grep -E "Citation .* undefined|There were undefined references" main.log
            test -f main.pdf
          '

      - name: Upload PDF artifact (${{ matrix.layout }})
        uses: actions/upload-artifact@v7
        with:
          name: thesis-pdf-${{ matrix.layout }}
          path: |
            main.pdf
            attachments.zip
          if-no-files-found: error