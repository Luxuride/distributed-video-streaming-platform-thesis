name: Build thesis PDF

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS objects
        run: |
          git lfs install --local
          git lfs pull

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Prepare attachments directory
        run: mkdir -p attachments

      - name: Generate p2p-stream attachment archive
        continue-on-error: true
        run: |
          rm -f attachments/p2p-stream.zip
          zip -r attachments/p2p-stream.zip p2p-stream

      - name: Generate analysis attachment archive
        continue-on-error: true
        run: |
          rm -f attachments/analysis.zip
          zip -r attachments/analysis.zip analysis

      - name: Download p2p-stream Linux binary artifact
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/download-github-artifact.sh \
            --artifact-name p2p-stream-linux \
            --output-path attachments/p2p-stream-linux.zip

      - name: Download p2p-stream AppImage artifact
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/download-github-artifact.sh \
            --artifact-name p2p-stream-linux-appimage \
            --output-path attachments/p2p-stream-linux-appimage.zip

      - name: Build thesis PDF
        run: |
          nix develop -c bash -lc '
            set -euo pipefail
            rm -f main.pdf main.aux main.bbl main.blg main.fdb_latexmk main.fls main.lof main.log main.lot main.out main.toc main.synctex.gz
            mkdir -p out/recorder-pipeline out/renderer-pipeline
            plantuml -tpng recorder-pipeline.puml -o out/recorder-pipeline/
            plantuml -tpng renderer-pipeline.puml -o out/renderer-pipeline/
            pdflatex --shell-escape -synctex=1 -interaction=nonstopmode -file-line-error main.tex
            bibtex main
            pdflatex --shell-escape -synctex=1 -interaction=nonstopmode -file-line-error main.tex
            pdflatex --shell-escape -synctex=1 -interaction=nonstopmode -file-line-error main.tex
            ! grep -E "Citation .* undefined|There were undefined references" main.log
            test -f main.pdf
          '

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: |
            main.pdf
            attachments/
          if-no-files-found: error